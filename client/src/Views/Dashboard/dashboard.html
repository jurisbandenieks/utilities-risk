<div class="page">
  <h2 class="page__title">Dashboard</h2>

  <div class="stat-grid">
    @for (stat of stats; track stat.label) {
      <mat-card class="stat-card">
        <mat-card-content>
          <div class="stat-card__header">
            <span class="stat-card__label">{{ stat.label }}</span>
            <mat-icon class="stat-card__icon">{{ stat.icon }}</mat-icon>
          </div>
          <div class="stat-card__value">{{ stat.value }}</div>
          <div
            class="stat-card__change"
            [class.positive]="stat.positive"
            [class.negative]="!stat.positive"
          >
            <mat-icon>{{ stat.positive ? 'arrow_upward' : 'arrow_downward' }}</mat-icon>
            {{ stat.change }}
          </div>
        </mat-card-content>
      </mat-card>
    }
  </div>
</div>
