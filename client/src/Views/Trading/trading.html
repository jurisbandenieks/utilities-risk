<div class="page">
  <h2 class="page__title">Trading Blotter</h2>

  <mat-card>
    <mat-card-content>
      <table mat-table [dataSource]="trades" class="trading-table">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>Trade ID</th>
          <td mat-cell *matCellDef="let t">{{ t.id }}</td>
        </ng-container>

        <ng-container matColumnDef="commodity">
          <th mat-header-cell *matHeaderCellDef>Commodity</th>
          <td mat-cell *matCellDef="let t">{{ t.commodity }}</td>
        </ng-container>

        <ng-container matColumnDef="direction">
          <th mat-header-cell *matHeaderCellDef>Direction</th>
          <td mat-cell *matCellDef="let t">
            <span
              class="direction"
              [class.buy]="t.direction === 'BUY'"
              [class.sell]="t.direction === 'SELL'"
            >
              {{ t.direction }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="quantity">
          <th mat-header-cell *matHeaderCellDef>Quantity</th>
          <td mat-cell *matCellDef="let t">{{ t.quantity | number }}</td>
        </ng-container>

        <ng-container matColumnDef="price">
          <th mat-header-cell *matHeaderCellDef>Price</th>
          <td mat-cell *matCellDef="let t">{{ t.price | number: '1.2-2' }}</td>
        </ng-container>

        <ng-container matColumnDef="counterparty">
          <th mat-header-cell *matHeaderCellDef>Counterparty</th>
          <td mat-cell *matCellDef="let t">{{ t.counterparty }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let t">
            <mat-chip [class]="'status-' + t.status">{{ t.status }}</mat-chip>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
